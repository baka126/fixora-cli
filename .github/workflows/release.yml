name: Build CLI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git describe --tags --always --dirty)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          mkdir -p dist
          binary="kubectl-fixora"
          output="${binary}"
          if [[ "${GOOS}" == "windows" ]]; then
            output="${binary}.exe"
          fi
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/fixora/kubectl-fixora/internal/version.Version=${VERSION}" \
            -o "dist/${output}" \
            ./cmd/kubectl-fixora
          tar -C dist -czf "${binary}_${VERSION}_${GOOS}_${GOARCH}.tar.gz" "${output}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubectl-fixora-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: kubectl-fixora_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        id: changelog
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="dist/release-notes.md"
          awk -v tag="$tag" -v version="$version" '
            BEGIN { capture=0; found=0 }
            /^## / {
              heading=$0
              if (capture) {
                capture=0
                exit
              }
              if (
                heading ~ "^## \\[" tag "\\]" ||
                heading ~ "^## \\[" version "\\]" ||
                heading ~ "^## " tag "([[:space:]-]|$)" ||
                heading ~ "^## " version "([[:space:]-]|$)"
              ) {
                capture=1
                found=1
                next
              }
            }
            capture { print }
            END {
              if (!found) {
                printf("CHANGELOG.md does not contain a release section for %s or %s\n", tag, version) > "/dev/stderr"
                exit 1
              }
            }
          ' CHANGELOG.md > "$notes_file"
          if [[ ! -s "$notes_file" ]]; then
            echo "CHANGELOG.md release section for ${tag} is empty" >&2
            exit 1
          fi
          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums.txt

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        working-directory: dist
        run: syft dir:. -o spdx-json=sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        working-directory: dist
        run: |
          for file in *.tar.gz checksums.txt sbom.spdx.json; do
            cosign sign-blob --yes "$file" --bundle "$file.bundle"
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/sbom.spdx.json
            dist/*.bundle
